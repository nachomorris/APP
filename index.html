<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Visit Potrero — Guía de Potrero de los Funes</title>
<meta name="description" content="Guía de experiencias, alojamientos, restaurantes y comercios de Potrero de los Funes, San Luis, Argentina.">
<meta name="theme-color" content="#F5A455">

<!-- Ícono de la app: se usa al agregar el sitio a la pantalla de inicio
     (iOS/Android) y como favicon. Generado a partir del isotipo de la
     marca (sol + cerro), recortado a cuadrado con fondo blanco. -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png?v=2">
<link rel="shortcut icon" href="favicon.ico?v=2">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Visit Potrero">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#F5A455;
    --primary-dark:#C2703A;
    --primary-light:#FCEEDC;
    --accent:#F5A455;
    --panel-top:#F5A455;
    --ink:#111111;
    --muted:#6b7280;
    --bg:#F7F8F3;
    --card:#ffffff;
    --border:#ECECEC;
    --radius:18px;
    --shadow:0 4px 18px rgba(17,17,17,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  .hidden{display:none!important;}
  body{
    font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:96px;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  button{font-family:inherit;}

  /* App shell */
  .app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}

  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--ink);
    color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;
    border-radius:0 0 22px 22px;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }
  header.topbar .logo{
    width:34px;height:34px;border-radius:50%;background:var(--primary);color:var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;
  }
  header.topbar .title{font-weight:800;font-size:16px;line-height:1.1;}
  header.topbar .sub{font-size:11px;opacity:.75;font-weight:500;}
  header.topbar .back{
    background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:50%;
    cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  header.topbar .back .icn{stroke-width:1.75;}
  header.topbar.hidden{display:none;}

  main{padding:16px 16px 8px;}

  /* Home top panel (marca + buscador + categorías, todo integrado) */
  .home-panel{
    background:var(--panel-top);color:var(--ink);
    border-radius:0 0 28px 28px;
    margin:-16px -16px 24px;padding:0 16px 18px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    transition:background-color .3s ease, padding .28s ease;
    will-change:background-color;
  }
  .home-panel.scrolled{
    background:rgba(245,164,85,.7);
  }
  .home-panel.scrolled.panel-active{
    background:var(--panel-top);
  }
  .panel-topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .panel-topbar .brand{
    display:flex;align-items:center;justify-content:center;background:#fff;
    padding:4px 23px;border-radius:0 0 16px 16px;flex:none;
    box-shadow:0 6px 14px rgba(0,0,0,.22), 0 2px 4px rgba(0,0,0,.14);
  }
  .panel-topbar .brand .logo-img{
    height:69px;width:auto;display:block;
  }
  .panel-topbar .brand.dual{gap:12px;padding:4px 16px;}
  .panel-topbar .brand.dual .logo-img{height:52px;}
  .panel-topbar .brand.dual .divider{width:1px;align-self:stretch;background:var(--border);}
  .panel-topbar .brand.dual.big{padding:8px 20px;}
  .panel-topbar .brand.dual.big .logo-img{height:66px;}
  .panel-topbar .searchbar{
    flex:1;max-width:90%;margin-bottom:0;padding:8px 12px;border-radius:12px;gap:6px;
    box-shadow:
      0 3px 8px rgba(0,0,0,.12),
      inset 0 1px 1px rgba(255,255,255,.9),
      inset 0 -2px 3px rgba(0,0,0,.08);
  }
  .panel-topbar .searchbar input{font-size:12px;}

  .section{margin:52px 0 26px;}
  .section:first-of-type{margin-top:0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .section-head h2{font-size:17px;margin:0;font-weight:700;}
  .section-head .see-all{font-size:12.5px;color:var(--primary-dark);font-weight:600;}
  .section-desc{font-size:12.5px;color:var(--muted);margin:-8px 0 12px;}

  /* Categories row (single row, swipeable) */
  .cat-grid{
    display:flex;gap:16px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    padding:2px 2px 4px;touch-action:pan-x;
    transition:padding .28s ease;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  .home-panel.collapsed .cat-grid{padding-top:0;padding-bottom:0;}
  .home-panel.collapsed{padding-bottom:12px;}
  .cat-grid::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex:0 0 auto;text-align:center;cursor:pointer;background:transparent;border:none;padding:0;
    scroll-snap-align:start;
  }
  .cat-chip .emoji{
    width:46px;height:46px;border-radius:50%;background:#fff;color:var(--primary-dark);
    display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 7px;
    box-shadow:
      0 3px 8px rgba(0,0,0,.15),
      inset 0 1px 1px rgba(255,255,255,.9),
      inset 0 -2px 3px rgba(0,0,0,.12);
    overflow:hidden;
    transition:width .25s ease, height .25s ease, margin .25s ease, opacity .2s ease, font-size .25s ease, box-shadow .25s ease, transform .15s ease;
  }
  .cat-chip .emoji .icn{stroke-width:1.75;}
  .home-panel.collapsed .cat-chip .emoji{
    width:0;height:0;margin:0;opacity:0;font-size:0;box-shadow:none;
  }
  .cat-chip .label{display:block;font-size:11px;font-weight:600;letter-spacing:.1px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.28);white-space:nowrap;transition:opacity .15s ease;}
  .cat-chip.active .emoji{outline:2px solid var(--primary-dark);}
  @media (hover:hover) and (pointer:fine){
    .cat-chip:not(.disabled):hover .label{opacity:.75;}
    .cat-chip:not(.disabled):hover .emoji{
      transform:translateY(-2px) scale(1.08);
      box-shadow:
        0 6px 14px rgba(0,0,0,.22),
        inset 0 1px 1px rgba(255,255,255,.9),
        inset 0 -2px 3px rgba(0,0,0,.12);
    }
  }
  /* Deshabilitado temporalmente (ver TEMP_ENABLED_CATEGORY_SLUGS): se ve
     gris y no se puede tocar, pero sigue visible. */
  .cat-chip.disabled{cursor:default;}
  .cat-chip.disabled .emoji{filter:grayscale(1);opacity:.45;}
  .cat-chip.disabled .label{color:var(--muted);opacity:.7;}

  /* Flechitas de scroll de categorías (sutiles, como en el menú de Pehuen) */
  .cat-grid-wrap{position:relative;}
  .edge-fade{
    position:absolute;top:0;bottom:0;width:28px;pointer-events:none;
    transition:opacity .2s ease;z-index:1;
  }
  .edge-fade.left{left:0;background:linear-gradient(to right, var(--bg) 30%, rgba(247,248,243,0));}
  .edge-fade.right{right:0;background:linear-gradient(to left, var(--bg) 30%, rgba(247,248,243,0));}
  .edge-fade.on-panel.left{background:linear-gradient(to right, var(--panel-top) 40%, rgba(245,164,85,0));}
  .edge-fade.on-panel.right{background:linear-gradient(to left, var(--panel-top) 40%, rgba(245,164,85,0));}
  .edge-fade.is-hidden{opacity:0;}

  /* Envoltorio de los sliders horizontales (Descuentos / Lugares): degradado fijo, solo del lado derecho */
  .hscroll-wrap{position:relative;}
  .hscroll-wrap .edge-fade{width:16px;}
  .hscroll-wrap .edge-fade.right{background:linear-gradient(to left, var(--bg), rgba(247,248,243,0));}
  .scroll-chevron{
    position:absolute;top:26px;transform:translateY(-50%);
    width:20px;height:30px;
    display:flex;align-items:center;justify-content:center;
    background:none;border:none;box-shadow:none;cursor:pointer;padding:0;
    transition:opacity .2s ease, visibility .2s ease;
    z-index:2;
  }
  /* Flecha dibujada con CSS (no depende de fuentes/emoji, se ve igual en todos lados) */
  .scroll-chevron::before{
    content:'';display:block;width:4px;height:4px;
    border-top:1.5px solid rgba(51,51,51,.75);
    border-right:1.5px solid rgba(51,51,51,.75);
  }
  .scroll-chevron.left::before{transform:rotate(-135deg);margin-left:5px;}
  .scroll-chevron.right::before{transform:rotate(45deg);margin-right:5px;}
  .scroll-chevron.left{left:-2px;}
  .scroll-chevron.right{right:-2px;}
  .scroll-chevron.is-hidden{opacity:0;visibility:hidden;pointer-events:none;}

  /* Map CTA */
  .map-cta{
    display:flex;align-items:center;gap:14px;background:var(--ink);color:#fff;border-radius:20px;
    padding:16px;box-shadow:var(--shadow);cursor:pointer;
  }
  .map-cta .emoji{font-size:30px;}
  .map-cta .t1{font-size:11px;color:var(--primary);font-weight:700;letter-spacing:.03em;}
  .map-cta .t2{font-size:15px;font-weight:700;margin:2px 0;}
  .map-cta .t3{font-size:12px;color:#cbd5e1;}

  /* Horizontal scroller */
  .hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity;touch-action:pan-x;-webkit-overflow-scrolling:touch;}
  .hscroll::-webkit-scrollbar{display:none;}
  .place-card{
    flex:0 0 auto;width:200px;background:var(--card);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);scroll-snap-align:start;border:1px solid var(--border);
  }
  .place-card .img{height:110px;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--primary);background:var(--ink);position:relative;overflow:hidden;}
  .place-card .img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .place-card .body{padding:10px 12px 14px;}
  .place-card .tag{font-size:10px;color:var(--primary-dark);font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
  .place-card .name{font-size:13.5px;font-weight:700;margin:3px 0 4px;}
  .place-card .desc{font-size:11.5px;color:var(--muted);line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

  /* Promo cards (idénticas a "Descuentos imperdibles" de PLIN: foto arriba, texto abajo) */
  .promo-card{
    flex:0 0 68%;border-radius:18px;overflow:hidden;background:var(--ink);color:#fff;
    display:flex;flex-direction:column;scroll-snap-align:start;cursor:pointer;
  }
  .promo-card .promo-img{
    height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;
    position:relative;overflow:hidden;
  }
  .promo-card .promo-img img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .promo-card .promo-caption{padding:10px 12px 12px;}
  .promo-card .promo-name{font-size:11px;opacity:.8;margin-bottom:3px;}
  .promo-card .promo-highlight{font-size:16px;font-weight:600;margin-bottom:2px;}
  .promo-card .promo-sub{font-size:11px;opacity:.9;}

  /* Página completa "Destacado" (accesible desde el menú inferior, igual que Agenda/Novedades) */
  .destacado-page-card{
    border-radius:18px;overflow:hidden;background:var(--ink);color:#fff;
    margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;
  }
  .destacado-page-card .img{
    height:160px;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-size:44px;
  }
  .destacado-page-card .img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .destacado-page-card .body{padding:12px 16px 16px;}
  .destacado-page-card .name{font-size:11px;opacity:.8;margin-bottom:3px;}
  .destacado-page-card .title{font-size:17px;font-weight:700;margin-bottom:3px;}
  .destacado-page-card .sub{font-size:12.5px;opacity:.9;}

  /* Business list */
  .biz-list{display:flex;flex-direction:column;gap:10px;}
  .biz-card{
    display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow);cursor:pointer;min-height:154px;
  }
  .biz-card .thumb{
    width:158px;flex:none;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;
  }
  .biz-card .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* Placeholder de logo (alojamientos sin foto propia todavía): se ve completo,
     sin recortarse como pasaría con "cover" en una imagen apaisada. */
  .thumb-logo img.logo-fit{object-fit:contain;padding:16px;}
  .biz-card .info{flex:1;min-width:0;padding:14px 14px 14px 16px;display:flex;flex-direction:column;justify-content:center;}
  .biz-card .badges{display:flex;gap:6px;align-items:center;margin-bottom:2px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
  .badge.top{background:var(--ink);color:var(--primary);}
  .badge.featured{background:var(--primary);color:var(--ink);}
  .biz-card .name{font-size:14px;font-weight:700;margin:0 0 2px;}
  .biz-card .cat{font-size:11.5px;color:var(--primary-dark);font-weight:600;display:inline-flex;align-items:center;gap:4px;}
  .biz-card .addr{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-flex;align-items:center;gap:4px;max-width:100%;}
  .biz-card .more-link{display:inline-flex;align-items:center;gap:2px;font-size:11.5px;font-weight:700;color:var(--primary-dark);margin-top:auto;align-self:flex-end;padding-top:6px;}

  /* Search bar */
  .searchbar{
    display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:10px 14px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .searchbar input{border:none;outline:none;font-size:14px;flex:1;background:transparent;font-family:inherit;}
  .filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;touch-action:pan-x;}
  .filter-pill{
    flex:none;border:1px solid var(--border);background:var(--card);border-radius:20px;padding:7px 14px;
    font-size:12px;font-weight:600;cursor:pointer;color:var(--ink);white-space:nowrap;
  }
  .filter-pill.active{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff;}

  /* Actividades: selector segmentado de ancho completo (Deportivas/
     Culturales) debajo del panel naranja. El logo del Año de la
     Educación se muestra arriba, junto al de Potrero Encanta
     (ver .brand.dual). */
  #activitiesTagRow{
    display:flex;align-items:center;overflow:visible;
    background:var(--primary-light);border-radius:12px;padding:3px;gap:3px;
    margin-bottom:18px;
  }
  #activitiesTagRow .seg-btn{
    flex:1;border:none;background:transparent;border-radius:9px;padding:8px 7px;
    font-size:11.5px;font-weight:700;color:var(--ink);cursor:pointer;white-space:nowrap;
    display:inline-flex;align-items:center;justify-content:center;gap:5px;
  }
  #activitiesTagRow .seg-btn.active{
    background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12), inset 0 1px 1px rgba(255,255,255,.7);
  }

  /* Detail page */
  .detail-hero{height:180px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--primary);background:var(--ink);margin-bottom:16px;overflow:hidden;position:relative;}
  .detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .detail-hero.zoomable{cursor:zoom-in;}
  .detail-hero .zoom-hint{position:absolute;bottom:10px;right:10px;background:rgba(17,17,17,.72);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;}
  /* Ficha de comercio: la foto ocupa todo el ancho de la pantalla,
     sin los 16px de padding lateral del <main>. */
  .detail-hero.full-bleed{height:220px;margin:-16px -16px 16px;border-radius:0;}

  /* Lightbox: ver el flyer del evento en grande */
  .img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;}
  .img-lightbox img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5);object-fit:contain;}
  .img-lightbox-close{position:absolute;top:18px;right:18px;color:#fff;font-size:22px;font-weight:700;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .detail-title{font-size:21px;font-weight:800;margin:0 0 4px;}
  .detail-cat{font-size:13px;color:var(--primary-dark);font-weight:700;margin-bottom:10px;}
  .detail-badges{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .detail-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .detail-block h3{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin:0 0 6px;}
  .detail-block p{margin:0;font-size:14px;line-height:1.5;}
  .detail-row{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:6px 0;}
  .detail-row .ic{width:26px;text-align:center;font-size:15px;}
  .cta-btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
  .cta-btns a{flex:1 1 calc(50% - 5px);text-align:center;padding:12px;border-radius:14px;font-weight:700;font-size:13px;}
  .cta-btns .wsp{background:#25D366;color:#fff;}
  .cta-btns .map{background:var(--primary-dark);color:#fff;}
  .cta-btns .call{background:var(--primary);color:var(--ink);}
  .cta-btns .ig{background:#E4405F;color:#fff;}

  /* Events / novedades */
  .event-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;}
  .event-card .date{font-size:11px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;}
  .event-card h3{font-size:14.5px;margin:4px 0 4px;}
  .event-card p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.4;}

  /* ===== Agenda de eventos ===== */
  .agenda-intro{margin:0 0 16px;}
  .agenda-intro h1{margin-bottom:4px;}
  .agenda-intro p{font-size:13.5px;color:var(--muted);margin:0;line-height:1.4;}

  .filter-row.wrap{flex-wrap:wrap;overflow:visible;}
  .amenities-filter-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:2px 0 8px;}
  .detail-amenities{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .detail-amenity-tag{border:1px solid var(--border);background:var(--card);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--ink);}
  .card-amenities{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .card-amenity-icon{font-size:12px;}
  .filter-pill.free{border-color:var(--primary-dark);}
  .filter-pill.free.active{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff;}

  .agenda-group-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:22px 0 10px;}
  .agenda-group-title:first-of-type{margin-top:4px;}

  .agenda-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;}
  .agenda-card .cover{height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;background:var(--ink);}
  .agenda-card .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .agenda-card .cover .date-badge{position:absolute;top:10px;left:10px;background:#fff;color:var(--ink);border-radius:12px;padding:6px 11px;text-align:center;line-height:1.05;box-shadow:0 3px 8px rgba(0,0,0,.28);}
  .agenda-card .cover .date-badge .day{display:block;font-size:19px;font-weight:800;}
  .agenda-card .cover .date-badge .mon{display:block;font-size:10px;font-weight:800;text-transform:uppercase;color:var(--primary-dark);letter-spacing:.03em;}
  .agenda-card .cover .free-tag{position:absolute;top:10px;right:10px;background:var(--primary);color:var(--ink);font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:20px;}
  .agenda-card .body{padding:14px 16px 16px;}
  .agenda-card .when{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:6px;}
  .agenda-card h3{font-size:16px;font-weight:800;margin:0 0 6px;}
  .agenda-card .meta-row{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin-bottom:3px;}
  .agenda-card .desc{font-size:12.5px;color:var(--muted);line-height:1.4;margin:8px 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .agenda-card .org{font-size:11.5px;color:var(--ink);font-weight:600;margin-bottom:10px;}
  .agenda-card .org span{color:var(--muted);font-weight:500;}
  .agenda-card .more-btn{display:inline-block;background:var(--primary-dark);color:#fff;font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:12px;}

  .featured-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity;touch-action:pan-x;-webkit-overflow-scrolling:touch;}
  .featured-scroll::-webkit-scrollbar{display:none;}
  .featured-card{flex:0 0 78%;border-radius:20px;overflow:hidden;background:var(--ink);color:#fff;scroll-snap-align:start;cursor:pointer;box-shadow:var(--shadow);}
  .featured-card .cover{height:150px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;}
  .featured-card .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .featured-card .cover .star{position:absolute;top:10px;left:10px;background:var(--primary);color:var(--ink);font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:20px;}
  .featured-card .cap{padding:12px 14px 14px;}
  .featured-card .when{font-size:10.5px;color:var(--primary);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
  .featured-card h3{font-size:15px;margin:0 0 3px;}
  .featured-card .sub{font-size:11.5px;opacity:.85;}

  .fab-cargar{position:fixed;left:0;right:0;bottom:88px;display:flex;justify-content:center;z-index:25;pointer-events:none;}
  .fab-cargar a{pointer-events:auto;display:flex;align-items:center;gap:8px;background:var(--primary);color:var(--ink);font-weight:800;font-size:13.5px;padding:13px 22px;border-radius:999px;box-shadow:0 8px 20px rgba(0,0,0,.28);}

  .agenda-search-empty{margin-top:6px;}
  .agenda-archive-link{text-align:center;margin:24px 0 8px;font-size:13px;color:var(--muted);}
  .agenda-archive-link a{color:var(--primary-dark);font-weight:700;}

  /* Detalle de evento */
  .event-badges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .event-badges .free{background:var(--primary-light);color:var(--primary-dark);}
  .event-badges .price{background:#f3f4f6;color:var(--ink);}
  .schedule-item{padding:8px 0;border-bottom:1px solid var(--border);}
  .schedule-item:last-child{border-bottom:none;}
  .schedule-item .d{font-size:11px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;}
  .schedule-item .t{font-size:12px;color:var(--muted);margin:2px 0;}
  .schedule-item .desc{font-size:13px;}

  /* Map */
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13.5px;}

  /* Scroll reveal */
  .reveal{
    opacity:0;transform:translateY(26px);
    transition:opacity .6s cubic-bezier(.22,.68,.35,1), transform .6s cubic-bezier(.22,.68,.35,1);
    will-change:opacity,transform;
  }
  .reveal.revealed{opacity:1;transform:translateY(0);}
  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none;}
  }

  /* Bottom nav */
  nav.bottomnav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    display:flex;justify-content:center;
    padding:0 16px 16px;
    pointer-events:none;
  }
  nav.bottomnav .inner{
    display:flex;gap:4px;border-radius:22px;max-width:100%;
    padding:8px 8px;pointer-events:auto;overflow-x:auto;
    background:rgba(17,17,17,.5);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,.14);
    box-shadow:0 10px 28px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
    -ms-overflow-style:none;scrollbar-width:none;
  }
  nav.bottomnav .inner::-webkit-scrollbar{display:none;}
  nav.bottomnav a{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px 2px;
    font-size:10px;color:#fff;opacity:.62;font-weight:600;cursor:pointer;white-space:nowrap;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  nav.bottomnav a.active{opacity:1;}
  nav.bottomnav a .ic{
    font-size:16px;width:32px;height:32px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;margin-bottom:1px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  nav.bottomnav a.active .ic{
    background:var(--panel-top);
    transform:translateY(-3px) scale(1.08);
    box-shadow:
      0 6px 14px rgba(245,164,85,.55),
      inset 0 1px 1px rgba(255,255,255,.6),
      inset 0 -2px 2px rgba(0,0,0,.18);
  }
  @media (hover:hover) and (pointer:fine){
    nav.bottomnav a{transition:opacity .15s ease;}
    nav.bottomnav a:not(.active):hover{opacity:.9;}
    nav.bottomnav a:not(.active):hover .ic{
      background:rgba(255,255,255,.14);
      transform:translateY(-2px) scale(1.06);
    }
  }

  @media (min-width:521px){
    .app{border-left:1px solid var(--border);border-right:1px solid var(--border);}
  }
</style>

<body>
<div class="app">
  <header class="topbar" id="topbar"></header>
  <main id="view">
    <div class="empty-state">Cargando Visit Potrero...</div>
  </main>
  <nav class="bottomnav">
    <div class="inner" id="bottomnav"></div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/icons.js"></script>
<script>
/* ============ DATOS ============
   CATEGORIES, SUBCATEGORIES y BUSINESSES ahora se cargan en vivo desde
   Supabase (ver loadData() al final del archivo) en vez de venir de un
   data.js estático. PLACES (Lugares para visitar) también se carga desde
   Supabase (tabla places, administrable desde admin.html) — ver
   loadPlaces(). EVENTS/NOVEDADES todavía son contenido editorial fijo
   por su cuenta, igual que en el sitio viejo. */
let PLACES = [];

// TEMPORAL (reversible): solo estas categorías quedan habilitadas en el
// grid de iconos; el resto se ve en gris y no se puede tocar. Para
// volver a habilitar todas, borrar este bloque y usar
// `${CATEGORIES.map(...)}` directo (como estaba antes) en renderHome()
// y renderChamberHome().
const TEMP_ENABLED_CATEGORY_SLUGS = ['alojamiento', 'gastronomia'];
function catChipHtml(c){
  const enabled = TEMP_ENABLED_CATEGORY_SLUGS.includes(c.slug);
  const onclick = enabled ? ` onclick="navigate('/categoria/${c.slug}')"` : '';
  return `<div class="cat-chip${enabled ? '' : ' disabled'}"${onclick}>
    <div class="emoji">${catIcon(c.emoji,{size:26})}</div><span class="label">${c.label}</span>
  </div>`;
}

let EVENT_CATEGORIES = [];
let EVENTS = [];
let hasSession = false;

let NOVEDADES = [];

// Interruptor cargado desde app_settings (tabla clave/valor): el admin
// puede apagar toda la sección Novedades sin tocar código. Por defecto
// (si todavía no existe la fila, o falla la consulta) queda habilitada.
let NOVEDADES_ENABLED = true;
async function loadAppSettings(){
  try {
    const { data, error } = await supabaseClient
      .from('app_settings')
      .select('value')
      .eq('key', 'novedades_enabled')
      .maybeSingle();
    if (error) return;
    NOVEDADES_ENABLED = data ? data.value !== false : true;
  } catch(e){ /* si falla, se queda habilitada por defecto */ }
}

/* ============ ACTIVIDADES (deportivas / culturales) ============
   Calcado de la Agenda de eventos: misma tabla de estructura, mismo
   diseño de tarjetas y detalle, pero con una sola etiqueta fija en
   vez de una tabla de categorías, y sin ficha organizadora
   obligatoria (las carga el municipio desde el admin). */
const ACT_TAGS_PUBLIC = {
  deportiva: { id: 'deportiva', label: 'Deportiva', icon: '🏅', color: '#ca8a04' },
  cultural: { id: 'cultural', label: 'Cultural', icon: '🎭', color: '#7c3aed' },
};
// WhatsApp fijo de "Consultas" (detalle de cada actividad + barra
// inferior de toda la app): todas van a este mismo número, con un
// mensaje precargado, no al contacto propio de cada actividad/comercio.
const INQUIRIES_WHATSAPP = '+5492665022328';
const INQUIRIES_WHATSAPP_MSG = 'Hola, estoy en la APP de Potrero Encanta y quisiera hacerles una consulta.';
function inquiriesWaLink(){
  return waLink(INQUIRIES_WHATSAPP) + '?text=' + encodeURIComponent(INQUIRIES_WHATSAPP_MSG);
}
function activityTag(id){
  return ACT_TAGS_PUBLIC[id] || { id:'', label:'Actividad', icon:'🏅', color:'#111111' };
}
let ACTIVITIES = [];

/* Las actividades se hacen todo el año: en vez de fecha tienen los
   días de la semana en que se repiten. */
const ACT_DAYS_PUBLIC = [
  { id:'lunes', label:'Lunes' }, { id:'martes', label:'Martes' },
  { id:'miercoles', label:'Miércoles' }, { id:'jueves', label:'Jueves' },
  { id:'viernes', label:'Viernes' }, { id:'sabado', label:'Sábado' },
  { id:'domingo', label:'Domingo' },
];
function formatActivityDays(days){
  if(!days || !days.length) return '';
  const ordered = ACT_DAYS_PUBLIC.filter(d=>days.includes(d.id)).map(d=>d.label);
  if(ordered.length === 7) return 'Todos los días';
  if(ordered.length === 1) return ordered[0];
  return ordered.slice(0,-1).join(', ') + ' y ' + ordered[ordered.length-1];
}
function isActivityToday(a){
  const idx = new Date().getDay(); // 0=domingo..6=sábado
  const map = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  return (a.daysOfWeek || []).includes(map[idx]);
}

let CATEGORIES = [];
let SUBCATEGORIES = {};
let BUSINESSES = [];

/* ============ MODO CÁMARA (visitpotrero.com/udaer/, /ccta/, /aehga/) ============
   Esas carpetas redirigen acá con ?camara=UDAER (y opcionalmente
   &categoria=slug). Si viene un chamber válido, BUSINESSES se filtra a
   los comercios PUBLICADOS de esa cámara (y esa categoría si se pidió)
   y la home muestra solo ese listado, en vez de la home genérica. */
const CHAMBER_INFO = {
  UDAER: { label: 'Alojamientos UDAER', logo: 'udaer/udaer.jpg' },
  CCTA:  { label: 'Comercios CCTA' },
  AEHGA: { label: 'Comercios AEHGA' }
};
const CHAMBER_MODE = (() => {
  const v = (new URLSearchParams(location.search).get('camara') || '').toUpperCase().trim();
  return CHAMBER_INFO[v] ? v : null;
})();
const CHAMBER_CATEGORY_FILTER = (new URLSearchParams(location.search).get('categoria') || '').trim() || null;

/* Servicios/amenities de alojamiento (lista fija) */
const AMENITIES = [
  {id:'wifi', label:'Wifi', icon:'📶'},
  {id:'estacionamiento', label:'Estacionamiento', icon:'🅿️'},
  {id:'piscina', label:'Piscina', icon:'🏊'},
  {id:'desayuno', label:'Desayuno', icon:'🍳'},
  {id:'gym', label:'Gimnasio', icon:'🏋️'},
  {id:'aire_acondicionado', label:'Aire acondicionado', icon:'❄️'},
  {id:'parrilla', label:'Parrilla', icon:'🔥'},
  {id:'spa', label:'Spa', icon:'💆'},
  {id:'petfriendly', label:'Pet friendly', icon:'🐾'}
];
/* Etiquetas de gastronomía (mismo mecanismo que amenities de alojamiento) */
const GASTRO_TAGS = [
  {id:'menu_serrano', label:'Menú Serrano', icon:'🏔️'}
];
/* Beneficios/promociones: categoría aparte, no es un servicio ni una
   etiqueta — aplica tanto a alojamiento como a gastronomía. */
const BENEFITS = [
  {id:'bna', label:'Promo BNA', icon:'🏷️'}
];
/* Lista de tags/amenities aplicable según la categoría (vacío = esa categoría no tiene) */
function tagsForCategory(slug){
  if(slug === 'alojamiento') return AMENITIES;
  if(slug === 'gastronomia') return GASTRO_TAGS;
  return [];
}
function benefitsForCategory(slug){
  return (slug === 'alojamiento' || slug === 'gastronomia') ? BENEFITS : [];
}
function amenityInfo(id){
  return AMENITIES.find(a=>a.id===id) || GASTRO_TAGS.find(a=>a.id===id) || BENEFITS.find(a=>a.id===id) || {id, label:id, icon:'✔️'};
}

function cat(slug){ return CATEGORIES.find(c=>c.slug===slug) || CATEGORIES[0] || {slug:'', label:'Comercio', emoji:'🏪', color:'#111111'}; }
function jitter(base, i, scale){ return base + ((i*37 % 100)/100 - .5) * scale; }

/* ============ CARGA DESDE SUPABASE (reemplaza al data.js viejo) ============ */
async function loadData(){
  const { data: cats } = await supabaseClient
    .from('categories')
    .select('id, label, icon, color, sort_order')
    .order('sort_order', { ascending: true });

  CATEGORIES = (cats || []).map(c => ({
    slug: c.id,
    label: c.label,
    emoji: c.icon || '🏪',
    color: c.color || '#111111'
  }));

  const { data: subs } = await supabaseClient
    .from('subcategories')
    .select('id, category_id, label, sort_order')
    .order('sort_order', { ascending: true });

  SUBCATEGORIES = {};
  const subLabelById = {};
  (subs || []).forEach((s) => {
    subLabelById[s.id] = s.label;
    if (!SUBCATEGORIES[s.category_id]) SUBCATEGORIES[s.category_id] = [];
    SUBCATEGORIES[s.category_id].push(s.label);
  });

  const { data: rows, error } = await supabaseClient
    .from('businesses')
    .select('*')
    .eq('status', 'published');

  if (error) {
    document.getElementById('view').innerHTML = `<div class="empty-state">No se pudo cargar el catálogo: ${error.message}</div>`;
    throw error;
  }

  BUSINESSES = (rows || []).map((b) => ({
    id: b.legacy_id || b.id,
    uuid: b.id,
    name: b.name,
    category: b.category_id,
    subcategory: b.subcategory_id ? (subLabelById[b.subcategory_id] || '') : '',
    address: b.address || '',
    desc: b.description || '',
    phone: b.phone || '',
    whatsapp: b.whatsapp || '',
    email: b.email || '',
    instagram: b.instagram || '',
    facebook: b.facebook || '',
    web: b.website || '',
    top: false,
    featured: !!b.featured,
    lat: b.lat,
    lng: b.lng,
    mapsLink: b.maps_link || '',
    photo: (b.images && b.images[0]) ? b.images[0] : null,
    amenities: Array.isArray(b.amenities) ? b.amenities : []
  }));

  if (CHAMBER_MODE) {
    await applyChamberFilter();
  }

  const { data: sessionData } = await supabaseClient.auth.getSession();
  hasSession = !!sessionData.session;

  await loadFeaturedCards();
  await loadPlaces();
  await loadAgendaData();
  await loadActivitiesData();
  await loadAppSettings();
}

// Restringe BUSINESSES a los comercios (publicados) de la cámara pedida
// por la URL, y opcionalmente a una sola categoría (ej: alojamiento
// para UDAER). Si algo falla, se deja BUSINESSES vacío antes que
// mostrar comercios de otras cámaras.
async function applyChamberFilter(){
  const { data, error } = await supabaseClient
    .from('business_chambers')
    .select('business_id')
    .eq('chamber', CHAMBER_MODE);

  if (error) {
    console.error('Error cargando comercios de la cámara', error);
    BUSINESSES = [];
    return;
  }

  const chamberIds = new Set((data || []).map(r => r.business_id));
  BUSINESSES = BUSINESSES.filter(b => chamberIds.has(b.uuid));
  if (CHAMBER_CATEGORY_FILTER) {
    BUSINESSES = BUSINESSES.filter(b => b.category === CHAMBER_CATEGORY_FILTER);
  }
}

/* ============ LUGARES PARA VISITAR (administrable desde admin) ============ */
async function loadPlaces(){
  const { data, error } = await supabaseClient
    .from('places')
    .select('*')
    .eq('is_active', true)
    .order('sort_order', { ascending: true });

  if (error) { PLACES = []; return; }

  PLACES = (data || []).map(p => ({
    id: p.slug,
    name: p.name,
    type: p.type || '',
    emoji: p.emoji || '📍',
    desc: p.description || '',
    image: p.image_url || '',
    lat: p.lat,
    lng: p.lng
  }));
}

/* ============ SECCIÓN "DESTACADO" (antes "Descuentos imperdibles") ============ */
let FEATURED_CARDS = [];

async function loadFeaturedCards(){
  const { data, error } = await supabaseClient
    .from('featured_cards')
    .select('*, businesses(id, legacy_id, name, category_id)')
    .eq('is_active', true)
    .order('sort_order', { ascending: true });

  if (error) { FEATURED_CARDS = []; return; }

  FEATURED_CARDS = (data || []).map(f => ({
    id: f.id,
    title: f.title,
    subtitle: f.subtitle || '',
    image: f.image_url || '',
    business: f.businesses ? { id: f.businesses.legacy_id || f.businesses.id, name: f.businesses.name, category: f.businesses.category_id } : null,
    externalUrl: f.external_url || ''
  }));
}

/* ============ AGENDA DE EVENTOS: carga de datos ============ */
async function loadAgendaData(){
  const { data: cats } = await supabaseClient
    .from('event_categories')
    .select('id, label, icon, color, sort_order')
    .order('sort_order', { ascending: true });

  EVENT_CATEGORIES = cats || [];

  const { data: rows, error } = await supabaseClient
    .from('events')
    .select('*, businesses(id, legacy_id, name, category_id)')
    .eq('status', 'published')
    .order('start_date', { ascending: true });

  if (error) {
    console.error('Error cargando agenda', error);
    EVENTS = [];
    return;
  }

  EVENTS = (rows || []).map((e) => ({
    id: e.id,
    title: e.title,
    shortDesc: e.short_description || '',
    desc: e.description || '',
    cover: e.cover_image || '',
    coverFocalX: e.cover_focal_x != null ? e.cover_focal_x : 50,
    coverFocalY: e.cover_focal_y != null ? e.cover_focal_y : 50,
    gallery: e.gallery || [],
    category: e.category_id,
    tags: e.tags || [],
    startDate: e.start_date,
    endDate: e.end_date,
    startTime: e.start_time,
    endTime: e.end_time,
    address: e.address || '',
    lat: e.lat,
    lng: e.lng,
    contactName: e.contact_name || '',
    phone: e.phone || '',
    whatsapp: e.whatsapp || '',
    instagram: e.instagram || '',
    website: e.website || '',
    price: e.price,
    isFree: !!e.is_free,
    requiresRegistration: !!e.requires_registration,
    registrationUrl: e.registration_url || '',
    capacity: e.capacity,
    isFeatured: !!e.is_featured,
    featuredOrder: e.featured_order || 0,
    isOfficial: !!e.is_official,
    viewsCount: e.views_count || 0,
    business: e.businesses || null
  }));

  await loadNovedades();
}

/* ============ NOVEDADES: carga de datos ============ */
async function loadNovedades(){
  const { data, error } = await supabaseClient
    .from('novedades')
    .select('id, title, description, published_at')
    .eq('is_published', true)
    .order('published_at', { ascending: false });

  if (error) {
    console.error('Error cargando novedades', error);
    NOVEDADES = [];
    return;
  }

  NOVEDADES = (data || []).map((n) => ({
    id: n.id,
    title: n.title,
    desc: n.description || '',
    date: n.published_at
  }));
}

/* ============ ACTIVIDADES: carga de datos ============ */
async function loadActivitiesData(){
  const { data: rows, error } = await supabaseClient
    .from('activities')
    .select('*, businesses(id, legacy_id, name, category_id)')
    .eq('status', 'published')
    .order('title', { ascending: true });

  if (error) {
    console.error('Error cargando actividades', error);
    ACTIVITIES = [];
    return;
  }

  ACTIVITIES = (rows || []).map((a) => ({
    id: a.id,
    title: a.title,
    shortDesc: a.short_description || '',
    desc: a.description || '',
    cover: a.cover_image || '',
    coverFocalX: a.cover_focal_x != null ? a.cover_focal_x : 50,
    coverFocalY: a.cover_focal_y != null ? a.cover_focal_y : 50,
    gallery: a.gallery || [],
    tag: a.tag,
    daysOfWeek: a.days_of_week || [],
    startTime: a.start_time,
    endTime: a.end_time,
    address: a.address || '',
    lat: a.lat,
    lng: a.lng,
    contactName: a.contact_name || '',
    phone: a.phone || '',
    whatsapp: a.whatsapp || '',
    instagram: a.instagram || '',
    website: a.website || '',
    price: a.price,
    isFree: !!a.is_free,
    requiresRegistration: !!a.requires_registration,
    registrationUrl: a.registration_url || '',
    capacity: a.capacity,
    isFeatured: !!a.is_featured,
    featuredOrder: a.featured_order || 0,
    // Sin ficha organizadora vinculada: la organiza directamente el
    // municipio (no hay flujo de comercios cargando actividades).
    isOfficial: !a.businesses,
    viewsCount: a.views_count || 0,
    business: a.businesses || null
  }));
}

/* ============ HELPERS ============ */
function allItems(){
  return BUSINESSES.map(b=>({...b, kind:'comercio'}));
}
function getBusiness(id){ return BUSINESSES.find(b=>b.id===id); }
function getPlace(id){ return PLACES.find(p=>p.id===id); }

// Mientras el dueño no cargue una foto propia desde el panel, se muestra
// el logo como placeholder (igual que en la carga de eventos).
function photoForBusiness(b){
  if(b.photo) return b.photo;
  return 'images/logo-markk.png';
}

// Devuelve las subcategorías de un comercio como array, sin importar si
// vienen en el campo nuevo (subcategories: []) o en el viejo (subcategory: '').
function subcatsOf(b){
  if(Array.isArray(b.subcategories)) return b.subcategories.filter(Boolean);
  if(b.subcategory) return [b.subcategory];
  return [];
}

// El placeholder (logo) no debe recortarse como una foto real: se ve
// completo y con fondo blanco en vez de "cover" sobre el color de la categoría.
function isLogoPlaceholder(photo){ return photo === 'images/logo-markk.png'; }

function bizThumb(b){
  const c = cat(b.category);
  const photo = photoForBusiness(b);
  const isLogo = isLogoPlaceholder(photo);
  return `<div class="thumb${isLogo ? ' thumb-logo' : ''}" style="background:${isLogo ? '#fff' : c.color}">
    ${photo ? `<img src="${photo}" alt="${b.name}" loading="lazy"${isLogo ? ' class="logo-fit"' : ''}>` : catIcon(c.emoji,{size:34,color:isLogo?'var(--ink)':'#fff'})}
  </div>`;
}

function badgesFor(b){
  let h = '';
  if(b.top) h += `<span class="badge top">${ICON('star-filled',{size:11})} TOP</span>`;
  if(b.featured) h += `<span class="badge featured">${ICON('star',{size:11})} Destacado</span>`;

/* ============ FLECHAS DE CATEGORÍAS ============ */
function updateCatChevrons(){
  const grid = document.getElementById('catGrid');
  const left = document.getElementById('catChevronLeft');
  const right = document.getElementById('catChevronRight');
  const fadeLeft = document.getElementById('catFadeLeft');
  const fadeRight = document.getElementById('catFadeRight');
  if(!grid || !left || !right) return;
  const maxScroll = grid.scrollWidth - grid.clientWidth;
  const atStart = grid.scrollLeft <= 4;
  const atEnd = maxScroll <= 4 || grid.scrollLeft >= maxScroll - 4;
  left.classList.toggle('is-hidden', atStart);
  right.classList.toggle('is-hidden', atEnd);
  if(fadeLeft) fadeLeft.classList.toggle('is-hidden', atStart);
  if(fadeRight) fadeRight.classList.toggle('is-hidden', atEnd);
}
function scrollCatGrid(dir){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  grid.scrollBy({left: dir * 170, behavior:'smooth'});
}
function setupCatChevrons(){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  grid.addEventListener('scroll', updateCatChevrons, {passive:true});
  updateCatChevrons();
}

function setupEdgeFade(scrollId, fadeRightId){
  const el = document.getElementById(scrollId);
  const fadeRight = document.getElementById(fadeRightId);
  if(!el || !fadeRight) return;
  const update = () => {
    const maxScroll = el.scrollWidth - el.clientWidth;
    const atEnd = maxScroll <= 4 || el.scrollLeft >= maxScroll - 4;
    fadeRight.classList.toggle('is-hidden', atEnd);
  };
  el.addEventListener('scroll', update, {passive:true});
  update();
}

/* ============ SCROLL REVEAL ============ */
let revealObserver = null;
function initScrollReveal(){
  const els = document.querySelectorAll('.reveal:not(.revealed)');
  if(!els.length) return;
  if(!('IntersectionObserver' in window)){
    els.forEach(el=>el.classList.add('revealed'));
    return;
  }
  if(!revealObserver){
    revealObserver = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('revealed');
          revealObserver.unobserve(entry.target);
        }
      });
    }, {threshold:0.12, rootMargin:'0px 0px -30px 0px'});
  }
  els.forEach(el=>revealObserver.observe(el));
}

let lastHandledHash = null;
function navigate(path){
  const newHash = '#' + path;
  if(location.hash === newHash){ render(); return; }
  lastHandledHash = newHash;
  location.hash = newHash;
  render();
}
window.addEventListener('hashchange', () => {
  if(location.hash === lastHandledHash){ lastHandledHash = null; return; }
  render();
});

function parseRoute(){
  let h = location.hash.replace(/^#/,'') || '/';
  const parts = h.split('/').filter(Boolean);
  return parts;
}

// Registra cada carga de página en site_visits para medir el tráfico
// real del sitio (distinto de views_count, que es por ficha puntual).
// Fire-and-forget: si falla, no debe frenar la navegación.
function trackPageView(path){
  try {
    supabaseClient.from('site_visits').insert({ path: path || '/' }).then(() => {});
  } catch (e) { /* no-op */ }
}

function render(){
  const parts = parseRoute();
  window.scrollTo(0,0);
  trackPageView(location.hash.replace(/^#/, '') || '/');
  if(parts.length===0){ return CHAMBER_MODE ? renderChamberHome() : renderHome(); }
  if(parts[0]==='categoria') return renderCategoria(parts[1]);
  if(parts[0]==='buscar') return renderBuscar();
  if(parts[0]==='agenda' && parts[1]==='anteriores') return renderAgendaAnteriores();
  if(parts[0]==='agenda') return renderAgenda();
  if(parts[0]==='evento') return renderEventoDetail(parts[1]);
  if(parts[0]==='actividades') return renderActividades();
  if(parts[0]==='actividad') return renderActividadDetail(parts[1]);
  if(parts[0]==='novedades') return NOVEDADES_ENABLED ? renderNovedades() : renderHome();
  if(parts[0]==='destacado') return renderDestacado();
  if(parts[0]==='comercio') return renderComercio(parts[1]);
  if(parts[0]==='lugares') return renderLugar(parts[1]);
  return renderHome();
}

/* ---- HOME ---- */
let homeScrollHandler = null;
let homeLastScrollY = 0;
let homeTicking = false;
let homeIsCollapsed = false;
let homeIsScrolled = false;
function setupHomePanelFade(){
  const panel = document.querySelector('.home-panel');
  if(!panel) return;
  if(homeScrollHandler) window.removeEventListener('scroll', homeScrollHandler);
  homeLastScrollY = window.scrollY;
  homeIsCollapsed = false;
  homeIsScrolled = false;
  homeTicking = false;

  const update = () => {
    homeTicking = false;
    const p = document.querySelector('.home-panel');
    if(!p){ window.removeEventListener('scroll', homeScrollHandler); homeScrollHandler = null; return; }
    const y = Math.max(0, window.scrollY);
    const delta = y - homeLastScrollY;

    if(y > 24) homeIsScrolled = true;
    else if(y < 6) homeIsScrolled = false;
    p.classList.toggle('scrolled', homeIsScrolled);

    if(y <= 8){
      homeIsCollapsed = false;
    } else if(delta > 14){
      homeIsCollapsed = true;
    } else if(delta < -14){
      homeIsCollapsed = false;
    }
    p.classList.toggle('collapsed', homeIsCollapsed);
    homeLastScrollY = y;
  };

  homeScrollHandler = () => {
    if(homeTicking) return;
    homeTicking = true;
    requestAnimationFrame(update);
  };
  window.addEventListener('scroll', homeScrollHandler, {passive:true});
  update();
  const setActive = () => panel.classList.add('panel-active');
  const clearActive = () => panel.classList.remove('panel-active');
  panel.addEventListener('pointerdown', setActive);
  panel.addEventListener('pointerup', () => setTimeout(clearActive, 250));
  panel.addEventListener('pointerleave', clearActive);
  panel.addEventListener('pointercancel', clearActive);
}

  });

    lockHorizontalSwipe('subFilterRow');

    renderAmenitiesFilterRow(slug);
    lockHorizontalSwipe('amenitiesFilterRow');

function renderAmenitiesFilterRow(slug){
  const el = document.getElementById('amenitiesFilterRow');
  if(!el) return;
  el.innerHTML = tagsForCategory(slug).map(a=>{
    const active = categoriaFilterAmenities.includes(a.id);
    return `<button class="filter-pill ${active?'active':''}" onclick="toggleCategoriaAmenity('${slug}','${a.id}')">${catIcon(a.icon,{size:13})} ${a.label}</button>`;
  }).join('');
}
function renderBenefitsFilterRow(slug){
  const el = document.getElementById('benefitsFilterRow');
  if(!el) return;
  el.innerHTML = benefitsForCategory(slug).map(a=>{
    const active = categoriaFilterAmenities.includes(a.id);
    return `<button class="filter-pill ${active?'active':''}" onclick="toggleCategoriaAmenity('${slug}','${a.id}')">${catIcon(a.icon,{size:13})} ${a.label}</button>`;
  }).join('');
}
function toggleCategoriaAmenity(slug, id){
  const i = categoriaFilterAmenities.indexOf(id);
  if(i === -1) categoriaFilterAmenities.push(id); else categoriaFilterAmenities.splice(i,1);
  renderAmenitiesFilterRow(slug);
  renderBenefitsFilterRow(slug);
  renderCategoriaItems(slug);
}
function renderSubFilterRow(slug, subcats){
  document.getElementById('subFilterRow').innerHTML = ['all', ...subcats].map(sc=>{
    const label = sc==='all' ? 'Todas' : sc;
    return `<button class="filter-pill ${categoriaFilterSub===sc?'active':''}" onclick="setCategoriaFilterSub('${slug}','${sc}')">${label}</button>`;
  }).join('');
}
function setCategoriaFilterSub(slug, sc){
  categoriaFilterSub = (categoriaFilterSub === sc) ? 'all' : sc;
  const subcats = (typeof SUBCATEGORIES !== 'undefined' && SUBCATEGORIES[slug]) || [];
  renderSubFilterRow(slug, subcats);
  renderCategoriaItems(slug);
}
function renderCategoriaItems(slug){
  const q = categoriaFilterQ.trim();
  const items = BUSINESSES.filter(b=>{
    if(b.category !== slug) return false;
    if(categoriaFilterSub !== 'all' && !subcatsOf(b).includes(categoriaFilterSub)) return false;
    if(categoriaFilterAmenities.length){
      const ba = b.amenities || [];
      if(!categoriaFilterAmenities.every(a=>ba.includes(a))) return false;
    }
    if(!q) return true;
    return fuzzyMatch(q, b.name) || fuzzyMatch(q, b.address) || subcatsOf(b).some(sc=>fuzzyMatch(q, sc));
  });
  document.getElementById('categoriaItems').innerHTML = items.length ? items.map(bizCard).join('') : `<div class="empty-state">No encontramos comercios con ese filtro.</div>`;
  initScrollReveal();
}

/* ---- Búsqueda tolerante a acentos y pequeños errores de tipeo ---- */
function normalizeText(s){
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
}
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m===0) return n;
  if(n===0) return m;
  const dp = Array.from({length:m+1}, (_,i)=>[i, ...new Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}
function fuzzyMatch(query, text){
  const nq = normalizeText(query);
  const nt = normalizeText(text);
  if(!nq) return true;
  if(nt.includes(nq)) return true;
  const queryWords = nq.split(/\s+/).filter(Boolean);
  const textWords = nt.split(/\s+/).filter(Boolean);
  return queryWords.every(qw => {
    if(textWords.some(tw => tw.includes(qw) || qw.includes(tw))) return true;
    const maxDist = qw.length <= 4 ? 1 : (qw.length <= 8 ? 2 : 3);
    return textWords.some(tw => levenshtein(qw, tw) <= maxDist);
  });
}

}

// Botón "Cómo llegar": prioriza el link de Google Maps cargado en la
// ficha; si no hay, usa lat/lng viejas (fichas cargadas antes de este
// cambio) o la dirección de texto — en esos dos casos arma un link de
// RUTA (no solo un pin), para que Maps trace el camino desde la
// ubicación del visitante hasta el comercio.
function mapsUrlFor(b){
  if(b.mapsLink) return b.mapsLink;
  if(b.lat && b.lng) return `https://www.google.com/maps/dir/?api=1&destination=${b.lat},${b.lng}`;
  if(b.address) return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(b.address + ', Potrero de los Funes')}`;
  return '';
}

function instagramUrl(v){
  if(!v) return '';
  v = v.trim();
  if(/^https?:\/\//i.test(v)) return v;
  return 'https://instagram.com/' + v.replace(/^@/,'');
}
function websiteUrl(v){
  if(!v) return '';
  v = v.trim();
  if(/^https?:\/\//i.test(v)) return v;
  return 'https://' + v;
}
function facebookUrl(v){
  if(!v) return '';
  v = v.trim();
  if(/^https?:\/\//i.test(v)) return v;
  return 'https://facebook.com/' + v.replace(/^\//,'');
}
function isAddressUrl(v){
  return /^https?:\/\//i.test((v||'').trim());
}

/* ---- AGENDA DE EVENTOS ---- */
const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

function parseYMD(s){
  // 'YYYY-MM-DD' -> Date local (evita corrimientos de huso horario de new Date('YYYY-MM-DD'))
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function todayYMD(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function eventCat(id){ return EVENT_CATEGORIES.find(c=>c.id===id) || {id:'', label:'Evento', icon:'🎉', color:'#111111'}; }
function fmtDay(dateStr){
  const d = parseYMD(dateStr);
  return `${d.getDate()} de ${MESES_ES[d.getMonth()]}`;
}
function fmtDayShort(dateStr){
  const d = parseYMD(dateStr);
  return `${DIAS_ES[d.getDay()].slice(0,3)} ${d.getDate()} ${MESES_ES[d.getMonth()].slice(0,3)}`;
}
function fmtTimeRange(e){
  if(e.startTime && e.endTime) return `${e.startTime.slice(0,5)} a ${e.endTime.slice(0,5)} hs`;
  if(e.startTime) return `Desde las ${e.startTime.slice(0,5)} hs`;
  return '';
}
function fmtDateRange(e){
  if(e.startDate === e.endDate) return fmtDay(e.startDate);
  const d1 = parseYMD(e.startDate), d2 = parseYMD(e.endDate);
  if(d1.getMonth() === d2.getMonth()) return `Del ${d1.getDate()} al ${d2.getDate()} de ${MESES_ES[d2.getMonth()]}`;
  return `Del ${fmtDay(e.startDate)} al ${fmtDay(e.endDate)}`;
}
function eventEndMoment(e){
  const d = parseYMD(e.endDate);
  const t = e.endTime || e.startTime || '23:59:59';
  const [h,m] = t.split(':').map(Number);
  d.setHours(h||23, m||59, 0, 0);
  return d;
}
function eventStartMoment(e){
  const d = parseYMD(e.startDate);
  const t = e.startTime || '00:00:00';
  const [h,m] = t.split(':').map(Number);
  d.setHours(h||0, m||0, 0, 0);
  return d;
}
function isEventFinished(e){ return eventEndMoment(e).getTime() < Date.now(); }
function isEventThisWeek(e){
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const weekEnd = new Date(todayStart); weekEnd.setDate(weekEnd.getDate()+7); weekEnd.setHours(23,59,59,999);
  const s = eventStartMoment(e), en = eventEndMoment(e);
  return en >= todayStart && s <= weekEnd;
}
function isEventThisMonth(e){
  const now = new Date();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0); monthEnd.setHours(23,59,59,999);
  const s = eventStartMoment(e), en = eventEndMoment(e);
  return en >= todayStart && s <= monthEnd;
}
function activeUpcomingEvents(){
  return EVENTS.filter(e=>!isEventFinished(e)).sort((a,b)=>{
    const d = a.startDate.localeCompare(b.startDate);
    if(d !== 0) return d;
    return (a.startTime||'00:00').localeCompare(b.startTime||'00:00');
  });
}
function priceLabel(e){
  if(e.isFree) return 'Gratis';
  if(e.price != null && e.price !== '') return `$${Number(e.price).toLocaleString('es-AR')}`;
  return '';
}
function organizerName(e){
  if(e.business) return e.business.name;
  if(e.isOfficial) return 'Municipalidad de Potrero de los Funes';
  return e.contactName || '';
}
function waLink(phone){
  if(!phone) return '';
  return 'https://wa.me/' + phone.replace(/[^0-9]/g,'');
}

function matchesAgendaFilters(e){

  const q = agendaState.q.trim();
  if(q){
    const org = organizerName(e);
    if(!fuzzyMatch(q, e.title) && !fuzzyMatch(q, e.address) && !fuzzyMatch(q, org)) return false;
  }
  return true;
}

function renderAgendaList(){
  const items = activeUpcomingEvents().filter(matchesAgendaFilters);
  const list = document.getElementById('agendaList');
  if(!list) return;

  if(items.length === 0){
    list.innerHTML = `<div class="empty-state agenda-search-empty">No encontramos eventos con ese filtro. Probá con otra búsqueda o mirá "Próximos".</div>`;
    return;
  }

  const today = todayYMD();
  const tomorrow = (()=>{ const d=parseYMD(today); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  const in7 = (()=>{ const d=parseYMD(today); d.setDate(d.getDate()+7); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();

  const buckets = { hoy:[], manana:[], semana:[], despues:[] };
  items.forEach(e=>{
    if(e.startDate === today) buckets.hoy.push(e);
    else if(e.startDate === tomorrow) buckets.manana.push(e);
    else if(e.startDate < in7) buckets.semana.push(e);
    else buckets.despues.push(e);
  });

  let html = '';
  let counter = 0;
  const section = (title, arr) => {
    if(!arr.length) return;
    html += `<div class="agenda-group-title">${title}</div>`;
    arr.forEach(e=>{ html += agendaCard(e, counter++); });
  };
  section('Hoy', buckets.hoy);
  section('Mañana', buckets.manana);
  section('Esta semana', buckets.semana);
  section('Próximos eventos', buckets.despues);

  list.innerHTML = html;
  initScrollReveal();
}

function eventIcsHref(e){
  const pad = n => String(n).padStart(2,'0');
  const toIcsDate = (d) => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const start = eventStartMoment(e);
  const end = eventEndMoment(e);
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Visit Potrero//Agenda//ES','BEGIN:VEVENT',
    `UID:${e.id}@visitpotrero`,
    `DTSTART:${toIcsDate(start)}`,
    `DTEND:${toIcsDate(end)}`,
    `SUMMARY:${(e.title||'').replace(/\n/g,' ')}`,
    `LOCATION:${(e.address||'').replace(/\n/g,' ')}`,
    `DESCRIPTION:${(e.shortDesc || e.desc || '').replace(/\n/g,' ')}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
}

async function shareEvent(id){
  const e = EVENTS.find(x=>x.id===id);
  if(!e) return;
  const url = location.origin + location.pathname + '#/evento/' + id;
  const shareData = { title: e.title, text: e.shortDesc || e.title, url };

  if(navigator.share){
    try {
      await navigator.share(shareData);
      return; // el usuario eligió una app para compartir (o la cerró): listo
    } catch(err){
      if(err && err.name === 'AbortError') return; // cerró el panel de compartir, no hacemos nada más
      // si el share nativo falla por otro motivo, seguimos abajo y copiamos el link
    }
  }

  try {
    if(!navigator.clipboard) throw new Error('Clipboard no disponible');
    await navigator.clipboard.writeText(url);
    alert('Enlace copiado: ' + url);
  } catch(err){
    window.prompt('Copiá el enlace del evento:', url);
  }
}

}

function openImageLightbox(src, alt){
  const lb = document.getElementById('imgLightbox');
  const img = document.getElementById('imgLightboxImg');
  if(!lb || !img) return;
  img.src = src;
  img.alt = alt || '';
  lb.classList.remove('hidden');
}
function closeImageLightbox(){
  const lb = document.getElementById('imgLightbox');
  if(lb) lb.classList.add('hidden');
}

/* ============ ACTIVIDADES (deportivas / culturales) ============
   Misma pinta que la Agenda (reutiliza las clases .agenda-card,
   .featured-card, .home-panel, etc. y helpers genéricos ya definidos
   para eventos: priceLabel, organizerName, waLink, isAddressUrl).
   Se hacen todo el año (no tienen fecha puntual): en vez de fmtDateRange
   muestran los días de la semana (formatActivityDays) + horario.
   Ruta: /actividades y /actividad/:id, con su propio ícono en la
   barra inferior. */
let activitiesState = { q:'', tag:'todas' };

const ACT_DAY_ORDER = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
function activityEarliestDayIndex(a){
  const idxs = (a.daysOfWeek||[]).map(d=>ACT_DAY_ORDER.indexOf(d)).filter(i=>i>=0);
  return idxs.length ? Math.min(...idxs) : 99;
}

function activityCard(a, i){
  // Mismo tamaño/formato compacto que las tarjetas de comercios
  // (reutiliza .biz-card/.thumb/.info), en vez de las tarjetas
  // grandes de la Agenda de eventos.
  const t = activityTag(a.tag);
  return `<div class="biz-card reveal" style="transition-delay:${((i||0)%6)*60}ms; margin-bottom:10px;" onclick="navigate('/actividad/${a.id}')">
    <div class="info">
      <div class="badges">${a.isFree ? `<span class="badge featured">Gratis</span>` : ''}</div>
      <div class="name">${a.title}</div>
      <div class="cat">${catIcon(t.icon,{size:14})} ${t.label}</div>
      <div class="addr">${ICON('calendar',{size:13})} ${formatActivityDays(a.daysOfWeek)}${fmtTimeRange(a) ? ' · ' + fmtTimeRange(a) : ''}</div>
      <span class="more-link">Ver más ${ICON('chevron-right',{size:11})}</span>
    </div>
    <div class="thumb" style="background:${t.color || '#111'}">
      ${a.cover ? `<img src="${a.cover}" alt="${a.title}" loading="lazy" style="object-position:${a.coverFocalX||50}% ${a.coverFocalY||50}%">` : catIcon(t.icon||'🏅',{size:34,color:'#fff'})}
    </div>
  </div>`;
}

function activityFeaturedCard(a){
  const t = activityTag(a.tag);
  return `<div class="featured-card" onclick="navigate('/actividad/${a.id}')">
    <div class="cover" style="background:${t.color || '#111'}">
      ${a.cover ? `<img src="${a.cover}" alt="${a.title}" style="object-position:${a.coverFocalX||50}% ${a.coverFocalY||50}%">` : catIcon(t.icon||'🏅',{size:34,color:'#fff'})}
      <span class="star">${ICON('star-filled',{size:13})} Destacada</span>
    </div>
    <div class="cap">
      <div class="when">${formatActivityDays(a.daysOfWeek)}</div>
      <h3>${a.title}</h3>
      <div class="sub">${t.label}${(a.address && !isAddressUrl(a.address)) ? ' · ' + a.address : ''}</div>
    </div>
  </div>`;
}

function activeUpcomingActivities(){
  return ACTIVITIES.slice().sort((a,b)=>{
    const d = activityEarliestDayIndex(a) - activityEarliestDayIndex(b);
    if(d !== 0) return d;
    const t = (a.startTime||'00:00').localeCompare(b.startTime||'00:00');
    if(t !== 0) return t;
    return (a.title||'').localeCompare(b.title||'');
  });
}

function matchesActivitiesFilters(a){
  if(activitiesState.tag !== 'todas' && a.tag !== activitiesState.tag) return false;
  const q = activitiesState.q.trim();
  if(q){
    const org = organizerName(a);
    if(!fuzzyMatch(q, a.title) && !fuzzyMatch(q, a.address) && !fuzzyMatch(q, org)) return false;
  }
  return true;
}

function renderActividades(){
  hideTopbar();
  setBottomnav('actividades');
  const view = document.getElementById('view');

  const featured = activeUpcomingActivities().filter(a=>a.isFeatured).sort((a,b)=>a.featuredOrder-b.featuredOrder);

  view.innerHTML = `
    <div class="home-panel" style="padding-bottom:12px;">
      <div class="panel-topbar" style="margin-bottom:0;">
        <div class="brand dual big" style="flex:1;"><img class="logo-img" src="images/logo-mark.png" alt="Potrero encanta"><span class="divider"></span><img class="logo-img" src="images/educ.png" alt="Año de la Educación"></div>
      </div>
    </div>

    <div class="filter-row" id="activitiesTagRow"></div>

    ${featured.length ? `
    <div class="section" style="margin-top:0;">
      <div class="section-head"><h2>Destacadas</h2></div>
      <div class="featured-scroll">${featured.map(activityFeaturedCard).join('')}</div>
    </div>` : ''}

    <div class="section" style="margin-top:${featured.length?'32px':'0'};">
      <div id="activitiesList"></div>
    </div>
  `;

  document.getElementById('activitiesTagRow').innerHTML = [
    {k:'deportiva', ic:'trophy', l:'Deportivas'}, {k:'cultural', ic:'music', l:'Culturales'}
  ].map(f=>`<button class="seg-btn ${activitiesState.tag===f.k?'active':''}" onclick="setActividadesTag('${f.k}')">${ICON(f.ic,{size:13})} ${f.l}</button>`).join('');

  setupHomePanelFade();
  renderActividadesList();
  initScrollReveal();
}

// Sin botón "Todas": tocar una etiqueta ya activa la desmarca (vuelve a mostrar todas).
function setActividadesTag(k){ activitiesState.tag = (activitiesState.tag === k) ? 'todas' : k; renderActividades(); }

function renderActividadesList(){
  const items = activeUpcomingActivities().filter(matchesActivitiesFilters);
  const list = document.getElementById('activitiesList');
  if(!list) return;

  if(items.length === 0){
    list.innerHTML = `<div class="empty-state agenda-search-empty">No encontramos actividades con ese filtro. Probá con otra búsqueda o mirá "Todas".</div>`;
    return;
  }

  list.innerHTML = items.map((a,i)=>activityCard(a,i)).join('');
  initScrollReveal();
}

async function shareActivity(id){
  const a = ACTIVITIES.find(x=>x.id===id);
  if(!a) return;
  const url = location.origin + location.pathname + '#/actividad/' + id;
  const shareData = { title: a.title, text: a.shortDesc || a.title, url };

  if(navigator.share){
    try {
      await navigator.share(shareData);
      return;
    } catch(err){
      if(err && err.name === 'AbortError') return;
    }
  }

  try {
    if(!navigator.clipboard) throw new Error('Clipboard no disponible');
    await navigator.clipboard.writeText(url);
    alert('Enlace copiado: ' + url);
  } catch(err){
    window.prompt('Copiá el enlace de la actividad:', url);
  }
}

    <div class="event-badges">
      <span class="badge ${a.isFree ? 'free' : 'price'}">${a.isFree ? '● Entrada gratuita' : (priceLabel(a) ? '● ' + priceLabel(a) : '● Consultar precio')}</span>
      ${a.requiresRegistration ? '<span class="badge price">● Requiere inscripción</span>' : ''}
    </div>

      <p>${formatActivityDays(a.daysOfWeek)}${fmtTimeRange(a) ? ' · ' + fmtTimeRange(a) : ''}</p>

    <div class="detail-block hidden" id="actScheduleBlock">

      <div class="list"></div>
    </div>

    ${(a.desc || a.shortDesc) ? `<div class="detail-block">
      <h3>Descripción</h3>
      <p>${a.desc || a.shortDesc}</p>
    </div>` : ''}

    <div class="detail-block">
      <h3>Lugar y contacto</h3>
      ${a.address ? `<div class="detail-row"><span class="ic">${ICON('map-pin',{size:15})}</span>${isAddressUrl(a.address) ? `<a href="${a.address}" target="_blank" rel="noopener">Ver ubicación en Google Maps</a>` : a.address}</div>` : ''}
      ${orgBiz || a.isOfficial || a.contactName ? `<div class="detail-row"><span class="ic">${ICON('store',{size:15})}</span>${orgBiz ? `<a onclick="${orgLink}">${orgBiz.name}</a>` : (organizerName(a))}</div>` : ''}
      ${a.phone ? `<div class="detail-row"><span class="ic">${ICON('phone',{size:15})}</span>${a.phone}</div>` : ''}
      ${webUrl ? `<div class="detail-row"><span class="ic">${ICON('globe',{size:15})}</span><a href="${webUrl}" target="_blank" rel="noopener">${a.website}</a></div>` : ''}
      ${igUrl ? `<div class="detail-row"><span class="ic">${ICON('instagram',{size:15})}</span><a href="${igUrl}" target="_blank" rel="noopener">${a.instagram}</a></div>` : ''}
      ${a.capacity ? `<div class="detail-row"><span class="ic">${ICON('users',{size:15})}</span>Cupo limitado: ${a.capacity} personas</div>` : ''}
    </div>

    <div class="cta-btns">

      ${isAddressUrl(a.address) ? `<a class="map" href="${a.address}" target="_blank" rel="noopener">${ICON('navigation',{size:15})} Cómo llegar</a>` : ((a.lat && a.lng) ? `<a class="map" href="https://www.google.com/maps?q=${a.lat},${a.lng}" target="_blank" rel="noopener">${ICON('navigation',{size:15})} Cómo llegar</a>` : (a.address ? `<a class="map" href="https://www.google.com/maps?q=${encodeURIComponent(a.address + ', Potrero de los Funes')}" target="_blank" rel="noopener">${ICON('navigation',{size:15})} Cómo llegar</a>` : ''))}

function renderNovedades(){
  setTopbar({title:'Novedades', sub:'Visit Potrero', back:true});
  setBottomnav('novedades');
  document.getElementById('view').innerHTML = `
    <div class="section" style="margin-top:0;">
      ${NOVEDADES.length ? NOVEDADES.map((e,i)=>`<div class="event-card reveal" style="transition-delay:${(i%6)*60}ms"><div class="date">${fmtNovedadDate(e.date)}</div><h3>${e.title}</h3><p>${e.desc}</p></div>`).join('') : '<div class="empty-state">Todavía no hay novedades cargadas.</div>'}
    </div>
  `;
  initScrollReveal();
}
function fmtNovedadDate(dateStr){
  if(!dateStr) return '';
  const d = parseYMD(dateStr);
  return `${String(d.getDate()).padStart(2,'0')} ${MESES_ES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}

/* ---- DESTACADO (página completa, accesible desde el menú inferior) ---- */
function renderDestacado(){
  setTopbar({title:'Destacado', sub:'Visit Potrero', back:true});
  setBottomnav('destacado');
  document.getElementById('view').innerHTML = `
    <div class="section" style="margin-top:0;">
      ${FEATURED_CARDS.length ? FEATURED_CARDS.map((f,i)=>destacadoPageCard(f,i)).join('') : '<div class="empty-state">Todavía no hay tarjetas destacadas cargadas.</div>'}
    </div>
  `;
  initScrollReveal();
}
function destacadoPageCard(f, i){
  const biz = f.business;
  let onclick = '';
  if (biz) onclick = `onclick="navigate('/comercio/${biz.id}')"`;
  else if (f.externalUrl) onclick = `onclick="window.open('${f.externalUrl.replace(/'/g,"\\'")}', '_blank')"`;
  return `<div class="destacado-page-card reveal" style="transition-delay:${(i%6)*60}ms" ${onclick}>
    <div class="img">${f.image ? `<img src="${f.image}" alt="${f.title}" loading="lazy">` : ICON('star',{size:28,color:'#fff'})}</div>
    <div class="body">
      ${biz ? `<div class="name">${biz.name}</div>` : ''}
      <div class="title">${f.title}</div>
      ${f.subtitle ? `<div class="sub">${f.subtitle}</div>` : ''}
    </div>
  </div>`;
}

(async function start(){
  try {
    await loadData();
  } catch (e) {
    console.error('Error cargando datos de Supabase', e);
    return;

  render();
})();
